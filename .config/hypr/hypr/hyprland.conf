# ##########################
# ## Default Applications ##
# ##########################

$launcher     = rofi -show drun
$browser      = zen-twilight
$incogbrowser = zen-twilight -private-window
$sysmon       = btop
$music        = cmus
$editor       = nvim
$term         = kitty

# ######################
# ## Web Applications ##
# ######################

$app       = https:
$yt        = $app//youtube.com
$gemini    = $app//perplexity.ai
$chatgpt   = $app//chat.openai.com
$signal    = signal-desktop
$reddit    = $app//reddit.com
$ghprofile = $app//github.com/Cybersnake223?tab=repositories
$wallhaven = $app//wallhaven.cc

# ############################
# ## Environment Variables  ##
# ############################

# Hyprland
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,38

# GTK THEME
# env = GTK_THEME,Colloid-Purple-Dark-Compact-Catppuccin:dark
env = GTK_THEME,adw-gtk3-dark:dark

# XDG
env = XDG_CURRENT_DESKTOP=Hyprland
env = XDG_SESSION_TYPE=wayland
env = XDG_SESSION_DESKTOP=Hyprland
env = GDK_BACKEND=wayland,x11

# QT
env = QT_QPA_PLATFORM="wayland;xcb"
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# Video
env = SDL_VIDEODRIVER=wayland
env = CLUTTER_BACKEND=wayland

# Intel GPU
env = LIBVA_DRIVER_NAME,iHD
env = MESA_LOADER_DRIVER_NAME,iris

# Nvidia GPU
# eny = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ######################
# ## Startup Services ##
# ######################

exec-once = sleep 1 && xdg-portal-hyprland

# Bluetooth
exec-once = rfkill block bluetooth

# Auth agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Import env for Qt/systemd services
exec-once = systemctl --user import-environment XDG_SESSION_TYPE XDG_CURRENT_DESKTOP WAYLAND_DISPLAY QT_QPA_PLATFORMTHEME

# Wallpaper daemon, restore last wallpaper,bar + notifications
exec-once = awww-daemon --format xrgb
exec-once = sleep 0.3 && restore-wall
exec-once = waybar
exec-once = mako


# Clipboard
exec-once = wl-clip-persist -c both
exec-once = wl-paste --type text --watch cliphist store

# Keyring + idle daemon
 exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
exec-once = hypridle

# #############
# ## MONITOR ##
# #############

monitor = eDP-1,1920x1080@60,auto,1

# ##############
# ## Xwayland ##
# ##############

xwayland {
    force_zero_scaling   = true
    use_nearest_neighbor = true
    enabled              = true
}

# ###############
# ## Ecosystem ##
# ###############

ecosystem {
    no_update_news  = true
    no_donation_nag = true
}

# ################
# ## INPUT      ##
# ################

input {
    kb_layout          = us
    numlock_by_default = true
    follow_mouse       = 1
    sensitivity        = 0.3
    repeat_rate        = 60
    repeat_delay       = 400
    scroll_method      = 2fg

    touchpad {
        natural_scroll        = no
        disable_while_typing  = yes
        middle_button_emulation = no
        drag_lock             = no
        tap-to-click          = true
        scroll_factor         = 0.8
    }
}

cursor {
    sync_gsettings_theme = false
    enable_hyprcursor    = true
    no_hardware_cursors  = false
}

# ########################
# ## GENERAL            ##
# ########################

source = colors/colors.conf

general {
    gaps_in               = 2
    gaps_out              = 0
    layout                = dwindle
    border_size           = 2
    col.active_border     = $tertiary
    col.inactive_border   = $shadow
    resize_on_border      = true
    allow_tearing         = false
    extend_border_grab_area = 0
}

# ########################
# ## DECORATION         ##
# ########################

decoration {
    rounding          = 0
    rounding_power    = 0
    inactive_opacity  = 0.90
    active_opacity    = 1.0
    fullscreen_opacity = 1.0

    shadow {
        enabled       = false
        range         = 20
        scale         = 1.0
        color         = $shadow
        color_inactive = $shadow
    }

    blur {
        enabled    = true
        size       = 3
        passes     = 2
        brightness = 0.6
        contrast   = 1.0
        noise      = 0
        xray       = false
        popups     = false
    }
}

# ########################
# ## ANIMATIONS         ##
# ########################

animations {
    enabled = true
    # Snappy preset — bouncy, high-energy
    # bezier = overshot, 0.13, 0.99, 0.29, 1.1
    # bezier = kick,     0.34, 1.56, 0.64, 1.0
    # bezier = quick,    0.15, 0.0,  0.1,  1.0
    #
    # animation = windowsIn,   1, 3, kick,     slide
    # animation = windowsOut,  1, 2, quick,    slide
    # animation = windowsMove, 1, 2, overshot
    #
    # animation = workspaces,       1, 3, overshot, slide
    # animation = specialWorkspace, 1, 3, kick,     slidevert
    #
    # animation = fadeIn,     1, 3, quick
    # animation = fadeOut,    1, 2, quick
    # animation = fadeDim,    1, 2, quick
    # animation = fadeLayers, 1, 2, quick
    # animation = fadeSwitch, 1, 2, quick
    #
    # animation = layersIn,  1, 3, kick,  slide
    # animation = layersOut, 1, 1, quick, fade
    bezier = quint,  0.23,  1.0,   0.32,  1.0
    bezier = pop,    0.175, 0.885, 0.32,  1.275
    bezier = almost, 0.5,   0.5,   0.75,  1.0

    animation = windowsIn,   1, 4, quint, popin 87%
    animation = windowsOut,  1, 2, quint, popin 87%
    animation = windowsMove, 1, 3, quint
    animation = workspaces,       1, 4, quint, slide
    animation = specialWorkspace, 1, 3, pop,   slidevert
    animation = fadeIn,        1, 2, quint
    animation = fadeOut,       1, 1, almost
    animation = fadeDim,       1, 3, quint
    animation = fadeLayers,    1, 2, almost
    animation = fadeLayersIn,  1, 2, almost
    animation = fadeLayersOut, 1, 1, almost
    animation = fadeSwitch,    1, 2, quint
    animation = layersIn,  1, 3, pop,   slide
    animation = layersOut, 1, 2, quint, fade

}

# ########################
# ## LAYOUT             ##
# ########################

dwindle {
    pseudotile         = yes
    preserve_split     = yes
    force_split        = 1
    default_split_ratio = 1
}

master {
    new_status = master
}

# ########################
# ## MISC               ##
# ########################

misc {
    disable_hyprland_logo    = true
    enable_swallow           = true
    swallow_regex            = ^(kitty)$
    focus_on_activate        = true
    mouse_move_enables_dpms  = true
    vfr                      = true
    vrr                      = 2
    animate_manual_resizes   = false
    mouse_move_focuses_monitor = true
    disable_splash_rendering = true
    # new_window_takes_over_fullscreen = 2
}

render {
    direct_scanout        = false
    new_render_scheduling = true
}

debug {
    damage_tracking = 2
    disable_logs    = true
    disable_time    = true
}

# ########################
# ## KEYBINDS           ##
# ########################

# Media / Function Keys (XF86 for proper key symbol support)
# bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_SINK@ toggle
# bind  = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
# bind  = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
# bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
# bind  = , XF86MonBrightnessDown,exec, brightnessctl -q s 5%-
# bind  = , XF86MonBrightnessUp,  exec, brightnessctl -q s +5%

bind  = , F1,   exec, wpctl set-mute @DEFAULT_SINK@ toggle
bind  = , F2,   exec, wpctl set-volume @DEFAULT_SINK@ 10%-
bind  = , F3,   exec, wpctl set-volume @DEFAULT_SINK@ 10%+
bind  = , F4,   exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bind  = , F11,  exec, brightnessctl -q s 10%-
bind  = , F12,  exec, brightnessctl -q s +10%

# Keep F-key fallbacks for external keyboards
bind  = , F7,  exec, rfkill-toggle wlan
bind  = , F9,  exec, hyprlock
bind  = , Print, exec, screenshot

# Terminal & Core Apps
bind = ALT,       Return, exec, $term
bind = ALT,       Q,      killactive
bind = ALT,       R,      exec, $term -e yazi
bind = ALT,       M,      exec, $term -e $music
bind = ALT,       N,      exec, $term -e $editor
bind = ALT,       H,      exec, $term -e $sysmon
bind = ALT,       S,      exec, localsend
bind = ALT,       D,      exec, $launcher
bind = ALT,       E,      exec, rofiemoji
bind = ALT,       X,      exec, powermenu
bind = ALT,       B,      exec, btmenu
bind = ALT,       F,      fullscreen
bind = ALT,       T,      exec, $term -e aerc
bind = ALT,       K,      exec, wkill
bind = ALT,       W,      exec, changewall
bind = ALT,       L,      exec, $term --title airpods-tui -e airpods-tui
bind = ALT,       Y,      exec, ytdla
bind = ALT,       C,      exec, makoctl dismiss -a
bind = ALT,       V,      exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

bind = ALT SHIFT, V, exec, watchvid
bind = ALT SHIFT, L, exec, qs -p ~/.config/quickshell/hyprlens/UniversalSnip.qml -n
bind = ALT SHIFT, K, exec, ccleaner
bind = ALT SHIFT, T, exec, thunar
bind = ALT SHIFT, D, exec, aria2cd
bind = ALT SHIFT, C, exec, scriptedit
bind = ALT SHIFT, E, exec, editconf
bind = ALT SHIFT, N, exec, wifimenu
bind = ALT SHIFT, P, exec, $term --title wiremix -e wiremix

# Web Apps
bind = ALT SHIFT, B, exec, $browser
bind = ALT SHIFT, I, exec, $incogbrowser
bind = ALT,       G, exec, $browser $ghprofile
bind = ALT SHIFT, Y, exec, $browser $yt
bind = ALT SHIFT, G, exec, $browser $gemini
bind = ALT SHIFT, W, exec, $browser $wallhaven
bind = ALT SHIFT, O, exec, $browser $chatgpt
bind = ALT SHIFT, S, exec, $signal
bind = ALT SHIFT, R, exec, $browser $reddit

# Layout Controls
bind = ALT, P,   togglefloating
bind = ALT, J,   togglesplit

# Window Focus (arrow keys)
bind = ALT, left,  movefocus, l
bind = ALT, right, movefocus, r
bind = ALT, up,    movefocus, u
bind = ALT, down,  movefocus, d

# Swap Windows
bind = ALT SHIFT, left,  swapwindow, l
bind = ALT SHIFT, right, swapwindow, r
bind = ALT SHIFT, up,    swapwindow, u
bind = ALT SHIFT, down,  swapwindow, d

# Resize
bind = ALT CTRL, left,  resizeactive, -30 0
bind = ALT CTRL, right, resizeactive,  30 0
bind = ALT CTRL, up,    resizeactive,  0 -30
bind = ALT CTRL, down,  resizeactive,  0  30

# Mouse: move + resize
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# Special Workspace (scratchpad)
bind = ALT,       grave, togglespecialworkspace
bind = ALT SHIFT, grave, movetoworkspace, special

# Switch Workspaces
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# Move Windows to Workspaces
bind = ALT SHIFT, 1, movetoworkspacesilent, 1
bind = ALT SHIFT, 2, movetoworkspacesilent, 2
bind = ALT SHIFT, 3, movetoworkspacesilent, 3
bind = ALT SHIFT, 4, movetoworkspacesilent, 4
bind = ALT SHIFT, 5, movetoworkspacesilent, 5
bind = ALT SHIFT, 6, movetoworkspacesilent, 6
bind = ALT SHIFT, 7, movetoworkspacesilent, 7
bind = ALT SHIFT, 8, movetoworkspacesilent, 8
bind = ALT SHIFT, 9, movetoworkspacesilent, 9
bind = ALT SHIFT, 0, movetoworkspacesilent, 10

# Scroll through workspaces on bar
bind = ALT, mouse_down, workspace, e+1
bind = ALT, mouse_up,   workspace, e-1


# ########################
# ## WINDOW RULES       ##
# ########################

windowrule {
    name  = media-viewer-float
    float = 1
    match:title = ^(Media viewer)$
}

windowrule {
    name  = wiremix-float
    float = 1
    size  = 1000 800
    match:class = ^(kitty)$
    match:title = ^(wiremix)$
}

windowrule {
    name  = pavucontrol-float
    float = 1
    size  = 1000 800
    match:class = ^(org.pulseaudio.pavucontrol)$
    match:title = ^(Volume Control)$
}


windowrule {
    name  = airpods-float
    float = 1
    size  = 1000 800
    match:class = ^(kitty)$
    match:title = ^(airpods-tui)$
}

windowrule {
    name  = pip-float
    float           = 1
    pin             = 1
    keep_aspect_ratio = 1
    match:title = ^(Picture-in-Picture)$
}

windowrule {
    name  = open-files-size
    float = 1
    size  = 1000 800
    match:title = ^(Open Files)$
}

windowrule {
    name  = save-file-size
    size  = 1000 800
    match:title = ^(Save File)$
}

windowrule {
    name  = localsend-open-float
    float = 1
    size  = 1000 800
    match:class = ^(localsend)$
}

windowrule {
    name  = zen-twilight-open-float
    float = 1
    match:class = ^(zen-twilight-twilight)$
    match:title = ^(Open Files)$
}

windowrule {
    name  = zen-twilight-save-float
    float = 1
    match:class = ^(zen-twilight)$
    match:title = ^(Save File)$
}

windowrule {
    name  = zen-twilight-download-float
    float = 1
    size  = 1000 700
    match:class = ^(zen-twilight)$
    match:title = ^(Library)$
}
# ########################
# ## LAYER RULES        ##
# ########################

layerrule {
    name      = notif-slide
    animation = slide
    match:namespace = notifications
}

layerrule {
    name      = rofi-slide
    animation = slide
    dim_around = 1
    match:namespace = rofi
}

layerrule {
    name      = waybar-slide
    animation = slide
    blur      = 1
    match:namespace = waybar
}

layerrule {
    name      = hyprlock-slide
    animation = slide
    match:namespace = hyprlock
}


layerrule {
    name      = pavucontrol-slide
    animation = slide
    match:class = org.pulseaudio.pavucontrol
}


# ########################
# ## WORKSPACE RULES    ##
# ########################

workspace = w[tv1], gapsout:0, gapsin:0, bordersize:0, border:false, rounding:false
