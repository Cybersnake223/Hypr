# Color
source = colors/colors.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    immediate_render    = true
}

animations {
    enabled   = true
    animation = fadeIn,  1, 3, linear
    animation = fadeOut, 1, 3, linear
}

background {
    monitor     =
    path        = ~/.config/hypr/wallpaper/current.png
    blur_passes = 2
    blur_size   = 1
    brightness  = 0.5
    vibrancy    = 0.1
}

# Date
label {
    monitor     =
    text        = cmd[update:43200000] date '+%A, %B %d'
    color       = $tertiary
    font_size   = 16
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 48, -48
    halign      = left
    valign      = top
}

# Clock
# Hour
label {
    monitor     =
    text        = cmd[update:1000] date '+%H'
    color       = $tertiary
    font_size   = 120
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, 80
    halign      = center
    valign      = center
}

# Minutes
label {
    monitor     =
    text        = cmd[update:1000] date '+%M'
    color       = $tertiary
    font_size   = 120
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, -80
    halign      = center
    valign      = center
}

# Text
label {
    monitor     =
    text        = ENTER THE VOID
    color       = rgba(255,255,255,0.35)
    font_size   = 13
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, 48
    halign      = center
    valign      = bottom
}

# Input field (Invisible)
input-field {
    monitor           =
    size              = 260, 44
    outline_thickness = 0
    rounding          = 22
    dots_size         = 0.0
    dots_spacing      = 0.3
    dots_center       = true
    outer_color       = rgba(0,0,0,0)
    inner_color       = rgba(0,0,0,0)
    font_color        = rgba(0,0,0,0)
    check_color       = rgba(0,0,0,0)
    fail_color        = rgba(255,80,80,0.6)
    fade_on_empty     = true
    placeholder_text  = 
    fail_text         = <i>wrong ($ATTEMPTS)</i>
    hide_input        = true
    position          = 0, -9999
    halign            = center
    valign            = center
}
