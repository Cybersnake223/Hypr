source = colors/colors.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    immediate_render    = true
}

animations {
    enabled   = true
    animation = fadeIn,  1, 5, linear
    animation = fadeOut, 1, 5,  linear
}

background {
    monitor     =
    path        = ~/.config/hypr/wallpaper/current
    blur_passes = 2
    blur_size   = 1
    brightness  = 0.1
    vibrancy    = 0
}

# Outer ring
shape {
    monitor      =
    size         = 580, 580
    color        = rgba(0,0,0,0)
    rounding     = -1
    border_size  = 4
    border_color = $tertiary_container
    position     = 0, 0
    halign       = center
    valign       = center
}

# Inner filled circle
shape {
    monitor      =
    size         = 520, 520
    color        = rgba(0,0,0,0.5)
    rounding     = -1
    border_size  = 4
    border_color = $secondary_fixed
    position     = 0, 0
    halign       = center
    valign       = center
}

# Avatar
image {
    monitor      =
    path         = ~/.config/hypr/cslogo.png
    size         = 120
    rounding     = -1
    border_size  = 0
    border_color = $tertiary
    position     = 0, 180
    halign       = center
    valign       = center
}

# Clock
label {
    monitor     =
    text        = $TIME
    color       = $surface_tint
    font_size   = 78
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, 70
    halign      = center
    valign      = center
}

# Date
label {
    monitor     =
    text        = cmd[update:43200000] date '+%a · %d %b'
    color       = $tertiary
    font_size   = 15
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, 12
    halign      = center
    valign      = center
}

# Thin divider
shape {
    monitor      =
    size         = 200, 1
    color        = rgba(255,255,255,0.15)
    rounding     = 0
    position     = 0, 0
    halign       = center
    valign       = center
}

# Username
label {
    monitor     =
    text        = cmd[update:86400000] whoami
    color       = $error_container
    font_size   = 20
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, -30
    halign      = center
    valign      = center
}

# Stats row
label {
    monitor     =
    text        = cmd[update:3000] echo "󰍛 $(free -h | awk '/^Mem/{print $3}')  ·  $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo '--')% 󰁽"
    color       = $secondary_container
    font_size   = 15
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, -75
    halign      = center
    valign      = center
}

