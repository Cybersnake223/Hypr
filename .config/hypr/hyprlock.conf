# Input
input-field {
    monitor           =
    size              = 260, 44
    outline_thickness = 0
    rounding          = 22
    dots_size         = 0.24
    dots_spacing      = 0.3
    dots_center       = true
    outer_color       = rgba(0,0,0,0)
    inner_color       = rgba(255,255,255,0.1)
    font_color        = rgba(255,255,255,0.7)
    check_color       = $tertiary
    fail_color        = rgba(255,80,80,0.8)
    capslock_color    = rgba(255,220,80,0.8)
    fade_on_empty     = true
    placeholder_text  = <span foreground="##ffffff33">· · · · ·</span>
    fail_text         = <i>wrong ($ATTEMPTS)</i>
    hide_input        = false
    position          = 0, -130
    halign            = center
    valign            = center
}

