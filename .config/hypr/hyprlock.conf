# Color
source = colors/colors.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    immediate_render    = true
}

animations {
    enabled   = true
    animation = fadeIn,  1, 3, linear
    animation = fadeOut, 1, 3, linear
}

background {
    monitor     =
    path        = ~/.config/hypr/wallpaper/current.png
    blur_passes = 2
    blur_size   = 1
    brightness  = 0.5
    vibrancy    = 0.1
}

# Now Playing
label {
    monitor     =
    text        = cmd[update:30000] ~/.config/hypr/scripts/nowplaying
    color       = rgba(255,255,255,0.35)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font Propo
    position    = 24, 28
    halign      = left
    valign      = bottom
}

# Clock
label {
    monitor     =
    text        = cmd[update:1000] date '+%H:%M'
    color       = $tertiary
    font_size   = 96
    font_family = JetBrainsMono Nerd Font Propo
    shadow_size = 4
    shadow_passes = 3
    shadow_color = rgba(0,0,0,0.5)
    position    = 0, 105
    halign      = center
    valign      = center
}

# Divider
label {
    monitor     =
    text        = ─────────────────────
    color       = rgba(239,238,255,0.25)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, 27
    halign      = center
    valign      = center
}

# Day
label {
    monitor     =
    text        = cmd[update:43200] date '+%A, %B %d, %Y'
    color       = $secondary
    font_size   = 20
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, -10
    halign      = center
    valign      = center
}

# Input field
input-field {
    monitor           =
    size              = 300, 48
    outline_thickness = 0
    dots_size         = 0.3
    dots_spacing      = 0.5
    dots_center       = true
    outer_color       = rgba(0,0,0,0)
    inner_color       = rgba(0,0,0,0)
    font_color        = $on_surface
    check_color       = $tertiary
    fail_color        = rgba(255,236,233,0.9)
    fade_on_empty     = true
    placeholder_text  = $CAPS
    fail_text         = <i>wrong ($ATTEMPTS)</i>
    hide_input        = true
    position          = 0, -80
    halign            = center
    valign            = center
}

# Motto
label {
    monitor     =
    text        = ENTER THE VOID
    color       = rgba(255,255,255,0.3)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, -130
    halign      = center
    valign      = center
}

# Battery
label {
    monitor     =
    text        = cmd[update:30000] ~/.config/hypr/scripts/battery-status
    color       = rgba(255,255,255,0.35)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font Propo
    position    = -24, 28
    halign      = right
    valign      = bottom
}
