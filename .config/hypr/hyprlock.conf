# Uptime
label {
    monitor     =
    text        = cmd[update:60000] echo "$(uptime -p | sed 's/up //;s/ hours\?/h/;s/ minutes\?/m/')"
    color       = $primary
    font_size   = 17
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, -180
    halign      = center
    valign      = center
}
